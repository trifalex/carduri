<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta name="theme-color" content="#1e293b">
    <meta name="description" content="Portofelul meu de carduri de fidelitate">
    <title>Carduri de Fidelitate</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%231e293b'/%3E%3Crect x='20' y='30' width='60' height='40' rx='6' fill='%23fbbf24'/%3E%3Crect x='28' y='44' width='44' height='4' fill='%231e293b'/%3E%3Crect x='28' y='54' width='30' height='4' fill='%231e293b'/%3E%3C/svg%3E">
</head>
<body>
    <header class="app-header">
        <div class="header-row">
            <h1 class="app-title">
                <span class="title-icon" aria-hidden="true"></span>
                Carduri de Fidelitate
            </h1>
            <button type="button" id="filterToggle" class="filter-toggle" aria-expanded="false" aria-controls="alphaFilter" title="Filtreaza dupa litera">
                <span class="filter-toggle-icon" aria-hidden="true">A–Z</span>
                <span class="filter-active-letter" id="filterActiveLetter"></span>
            </button>
        </div>
        <nav class="alpha-filter" id="alphaFilter" aria-label="Filtru alfabetic" hidden></nav>
    </header>

    <main class="grid" id="grid" aria-label="Lista cardurilor de fidelitate"></main>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
        <button class="modal-close" id="modalClose" aria-label="Inchide">&times;</button>
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle"></h2>
            <div class="modal-image-wrap">
                <img id="modalImg" alt="" class="modal-image">
            </div>
            <p class="modal-hint">Arata codul casierului pentru scanare</p>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
